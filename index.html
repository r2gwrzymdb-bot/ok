<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Ayat</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow:hidden;
  text-align:center;
}

.scene{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{display:flex;}

button{
  padding:12px 20px;
  margin:10px;
  border-radius:20px;
  border:none;
  cursor:pointer;
}

.yes{background:red;color:white;}
.no{background:#444;color:white;}

.heart{
  position:absolute;
  animation:up 3s linear forwards;
}

@keyframes up{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-300px);opacity:0;}
}
</style>
</head>

<body>

<div class="scene active" id="s1">
  <h1>For Ayat 💖</h1>
  <button onclick="go(2)">Start</button>
</div>

<div class="scene" id="s2">
  <h1>انا بحبك 💖</h1>

  <button class="yes" onclick="yes()">YES</button>
  <button class="no" onclick="no()">NO</button>
</div>

<div class="scene" id="s3">
  <h1>💖 She said YES</h1>
</div>

<div class="scene" id="s4">
  <h1>💔 I understand</h1>
</div>

<script>
function go(n){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");
}

function yes(){
  go(3);
  for(let i=0;i<40;i++){
    let h=document.createElement("div");
    h.innerHTML="💖";
    h.className="heart";
    document.body.appendChild(h);

    h.style.left=Math.random()*100+"vw";
    h.style.top="80vh";

    setTimeout(()=>h.remove(),3000);
  }
}

function no(){
  go(4);
}
</script>

</body>
</html>
